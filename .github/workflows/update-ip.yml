name: Fetch and Merge VPS789 CF IPs & Domains

on:
  workflow_dispatch:
  schedule:
    - cron: '0 18 * * *' # 北京时间凌晨 2:00

permissions:
  contents: write

jobs:
  fetch-vps789-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout destination repo
        uses: actions/checkout@v4

      - name: Fetch and Filter Data
        run: |
          # 创建临时工作目录并清空目标 IP 文件
          mkdir -p ./tmp_data/
          > IP

          # ==========================================
          # 1. 抓取 vps789 的优选域名 (过滤掉纯IP，只保留域名)并格式化为 域名#域名
          # ==========================================
          curl -sSL https://vps789.com/openApi/cfIpTop20 | jq -r '.data.good[].ip' | grep -Ev '^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$' | awk '{print $0 "#" $0}' > ./tmp_data/01-domain.txt || true

          # ==========================================
          # 2. 抓取 vps789 的 CMCC (移动 IP) 并格式化为 ip#ip
          # ==========================================
          curl -sSL https://vps789.com/openApi/cfIpApi | jq -r '.data.CM[].ip' | awk '{print $0 "#" $0}' > ./tmp_data/02-cmcc.txt || true

          # ==========================================
          # 3. 抓取 vps789 的 CUCC (联通 IP) 并格式化为 ip#ip
          # ==========================================
          curl -sSL https://vps789.com/openApi/cfIpApi | jq -r '.data.CU[].ip' | awk '{print $0 "#" $0}' > ./tmp_data/03-cucc.txt || true

          # ==========================================
          # 4. 抓取 vps789 的 CTCC (电信 IP) 并格式化为 ip#ip
          # ==========================================
          curl -sSL https://vps789.com/openApi/cfIpApi | jq -r '.data.CT[].ip' | awk '{print $0 "#" $0}' > ./tmp_data/04-ctcc.txt || true

          # ==========================================
          # 5. 抓取 vps789 的公共优选 IP (只保留纯 IPv4) 并格式化为 ip#ip
          # ==========================================
          curl -sSL https://vps789.com/openApi/cfIpTop20 | jq -r '.data.good[].ip' | grep -E '^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$' | awk '{print $0 "#" $0}' > ./tmp_data/05-cfip.txt || true

          # ==========================================
          # 6. 数据清洗、去重并各自切片前 5 个合并
          # ==========================================
          for type_file in ./tmp_data/*.txt; do
            if [ -f "$type_file" ]; then
              # 1. 移除可能存在的空格和空行
              # 2. 通过 awk 对整行去重
              # 3. 用 head -n 5 截取每个分类的前 5 条追加到 IP 文件
              sed 's/[[:space:]]//g' "$type_file" | grep -v '^$' | awk '!a[$0]++' | head -n 5 >> IP || true
            fi
          done

          # 清理临时目录
          rm -rf ./tmp_data/

      - name: Commit and Push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          if [ -n "$(git status --porcelain IP)" ]; then
            git add IP
            git commit -m "Auto-refresh VPS789 Cloudflare data with self-matching notes ($(date +'%Y-%m-%d'))"
            git push
          else
            echo "没有产生任何新的变更。"
          fi
