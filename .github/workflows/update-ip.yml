name: Update IP List

on:
  # 允许手动触发
  workflow_dispatch:
  # 每天 UTC 时间 18:00 (北京时间凌晨 2:00) 自动运行一次
  schedule:
    - cron: '0 18 * * *'

permissions:
  contents: write

jobs:
  update-ip:
    runs-on: ubuntu-latest

    steps:
      # 1. 检出您自己的仓库（MIGHTYBLANK001/OT）
      - name: Checkout destination repo
        uses: actions/checkout@v4

      # 2. 临时检出 DustinWin/BestCF 仓库的 bestcf 分支
      - name: Checkout source repo
        uses: actions/checkout@v4
        with:
          repository: 'DustinWin/BestCF'
          ref: 'bestcf'
          path: 'bestcf-src'

      # 3. 过滤、处理数据并整合到 IP 文件
      - name: Process and Merge IPs
        run: |
          # 清空或初始化您仓库中的 IP 文件
          > IP
          
          # 遍历源仓库目录中的所有 txt 文件
          for file in bestcf-src/*.txt; do
            if [ -f "$file" ]; then
              filename=$(basename "$file")
              
              # 【过滤机制】在这里填入你想要排除的文件名
              # 如果想排除多个，用 | 隔开，例如: "proxy-ip.txt" | "bestcf-domain.txt"
              case "$filename" in
                "proxy-ip.txt" | "bestcf-domain.txt")
                  echo "跳过不需要的文件: $filename"
                  continue
                  ;;
              esac
              
              echo "正在提取文件: $filename"
              
              # 直接获取前 5 行并追加到 IP 文件中（去掉了来源标记和多余空行）
              head -n 5 "$file" >> IP
            fi
          done
          
          # 清理临时下载的源仓库文件
          rm -rf bestcf-src

      # 4. 提交并推送到您的仓库
      - name: Commit and Push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # 检查 IP 文件是否有变动
          if [ -n "$(git status --porcelain IP)" ]; then
            git add IP
            git commit -m "Auto-update IP list without proxy IPs ($(date +'%Y-%m-%d'))"
            git push
          else
            echo "IP 文件没有变化，跳过提交。"
          fi
